name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Validate manifest and all referenced TPM tables
        run: uv run python scripts/validate_all.py
